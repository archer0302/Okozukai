apiVersion: 1

datasources:
  - name: Okozukai PostgreSQL
    uid: okozukai-postgres
    type: postgres
    access: proxy
    isDefault: true
    editable: true
    url: ${GRAFANA_DB_HOST}:${GRAFANA_DB_PORT}
    user: ${GRAFANA_DB_USER}
    secureJsonData:
      password: ${GRAFANA_DB_PASSWORD}
    jsonData:
      database: ${GRAFANA_DB_NAME}
      sslmode: ${GRAFANA_DB_SSLMODE}
      postgresVersion: 1500
      timescaledb: false
